services:
  # ==================== DATABASES ====================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claims-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - claims-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: claims-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - claims-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==================== MESSAGING ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: claims-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - claims-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: claims-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - claims-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ==================== SEARCH ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: claims-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - claims-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: claims-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - claims-network

  # ==================== MONITORING ====================
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: claims-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - claims-network

  grafana:
    image: grafana/grafana:10.3.0
    container_name: claims-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - claims-network

  # ==================== MICROSERVICES ====================
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    container_name: claims-auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - claims-network
    restart: on-failure

  policy-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: policy-service
    container_name: claims-policy-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/policy_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - claims-network
    restart: on-failure

  claims-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: claims-service
    container_name: claims-claims-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/claims_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - claims-network
    restart: on-failure

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: ai-service
    container_name: claims-ai-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_AI_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-demo-mode}
      JWT_SECRET: ${JWT_SECRET:-claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - claims-network
    restart: on-failure

  search-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: search-service
    container_name: claims-search-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/search_db
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - claims-network
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
    container_name: claims-api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: auth-service
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://auth-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/auth/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: policy-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://policy-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/api/policies/**,/api/customers/**
      SPRING_CLOUD_GATEWAY_ROUTES_2_ID: claims-service
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://claims-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0: Path=/api/claims/**
      SPRING_CLOUD_GATEWAY_ROUTES_3_ID: ai-service
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://ai-service:8084
      SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0: Path=/api/ai/**
      SPRING_CLOUD_GATEWAY_ROUTES_4_ID: search-service
      SPRING_CLOUD_GATEWAY_ROUTES_4_URI: http://search-service:8085
      SPRING_CLOUD_GATEWAY_ROUTES_4_PREDICATES_0: Path=/api/search/**
    depends_on:
      - auth-service
      - policy-service
      - claims-service
      - ai-service
      - search-service
    networks:
      - claims-network
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: claims-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - claims-network
    restart: on-failure

volumes:
  postgres_data:
  mongo_data:
  es_data:
  grafana_data:

networks:
  claims-network:
    driver: bridge
