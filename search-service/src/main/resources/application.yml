server:
  port: 8085

spring:
  application:
    name: search-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/search_db}
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: search-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.claimsplatform.*"

jwt:
  secret: ${JWT_SECRET:claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}
