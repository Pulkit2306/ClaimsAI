server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: policy-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/policies/**,/api/customers/**

        - id: claims-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/claims/**

        - id: ai-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**

        - id: search-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/search/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

jwt:
  secret: ${JWT_SECRET:claims-platform-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512}

management:
  endpoints:
    web:
      exposure:
        include: health, gateway
